<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Agent Hub - 个人智能空间</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; height: 100vh; align-items: center; }
        
        /* 聊天主界面 (初始模糊) */
        #chat-container { width: 750px; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; overflow: hidden; filter: blur(5px); transition: filter 0.3s; pointer-events: none; }
        #header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .msg-sender { font-size: 12px; color: #666; margin-bottom: 4px; padding-left: 5px; }
        .message { padding: 10px 15px; border-radius: 15px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; word-wrap: break-word;}
        
        .msg-left { align-self: flex-start; }
        .msg-left .message { background: #f1f3f4; color: #3c4043; border-top-left-radius: 2px; }
        
        .msg-ai { align-self: flex-start; max-width: 90%; }
        .msg-ai .message { background: #e8f0fe; color: #1565c0; border: 1px solid #d2e3fc; border-top-left-radius: 2px; }
        .msg-ai .msg-sender { color: #1a73e8; font-weight: bold; }
        
        /* 打字机光标 */
        .typing-cursor::after { content: ' ▋'; animation: blink 1s step-end infinite; color: #1a73e8; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .status-sys { align-self: center; font-size: 13px; color: #888; background: #f8f9fa; padding: 4px 12px; border-radius: 20px; }
        
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        #input-box { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 15px; }
        #send-btn { background: #1a73e8; color: white; border: none; padding: 10px 25px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-size: 15px; transition: background 0.2s; }
        #send-btn:hover { background: #1557b0; }

        /*  极客登录悬浮面板  */
        #auth-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #auth-box { background: white; padding: 30px 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        #auth-box h2 { margin-top: 0; color: #1a73e8; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .auth-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #login-btn { background: #1a73e8; color: white; }
        #reg-btn { background: #f1f3f4; color: #3c4043; margin-top: 10px; }
        #auth-status { margin-top: 15px; font-size: 13px; color: #d32f2f; min-height: 20px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div id="auth-box">
            <h2>AI Agent Hub</h2>
            <p style="font-size: 13px; color: #666; margin-bottom: 20px;">系统已锁定，请验证身份</p>
            <input type="text" id="username" class="auth-input" placeholder="请输入用户名">
            <input type="password" id="password" class="auth-input" placeholder="请输入密码 (区分大小写)" onkeypress="if(event.key==='Enter') doLogin()">
            <button id="login-btn" class="auth-btn" onclick="doLogin()">登 录 系 统</button>
            <button id="reg-btn" class="auth-btn" onclick="doRegister()">注 册 账 号</button>
            <div id="auth-status"></div>
        </div>
    </div>

    <div id="chat-container">
        <div id="header">🌐 个人智能空间 (未登录)</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="input-box" placeholder="输入你想说的话..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputBox = document.getElementById('input-box');
        const authStatus = document.getElementById('auth-status');
        const authOverlay = document.getElementById('auth-overlay');
        const chatContainer = document.getElementById('chat-container');
        const header = document.getElementById('header');
        
        let currentUser = "";
        const ws = new WebSocket('ws://127.0.0.1:8080');

        ws.onopen = () => { authStatus.style.color = "#1a73e8"; authStatus.textContent = "已连接到服务器，请鉴权"; };
        ws.onclose = () => { authStatus.style.color = "red"; authStatus.textContent = "服务器连接断开，请检查后端"; };

        // 核心：发起登录请求
        function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if(!user || !pwd) { authStatus.textContent = "用户名和密码不能为空"; return; }
            ws.send(JSON.stringify({ type: "login", username: user, password: pwd }));
        }

        // 核心：发起注册请求
        function doRegister() {
            const user = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if(!user || !pwd) { authStatus.textContent = "用户名和密码不能为空"; return; }
            ws.send(JSON.stringify({ type: "register", username: user, password: pwd }));
        }

        // 核心：发送聊天消息 (包装成 JSON)
        function sendMessage() {
            const text = inputBox.value.trim();
            if (!text || ws.readyState !== WebSocket.OPEN) return;
            // 不再发送纯文本，而是严格格式的 JSON
            ws.send(JSON.stringify({ type: "chat", text: text }));
            inputBox.value = '';
        }

        // 接收后端消息处理
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                // 1. 处理登录成功信号
                if (data.type === 'login_success') {
                    currentUser = data.username;
                    authOverlay.style.display = 'none'; // 隐藏登录框
                    chatContainer.style.filter = 'none'; // 取消模糊
                    chatContainer.style.pointerEvents = 'auto'; // 允许点击
                    header.textContent = `🌐 ${currentUser} 的专属智能空间`;
                    messagesDiv.innerHTML = ''; // 清空大厅
                }
                
                // 2. 处理系统提示 (在未登录时显示在面板上，登录后显示在聊天框)
                else if (data.type === 'system') {
                    if (currentUser === "") {
                        authStatus.style.color = data.text.includes('✅') ? 'green' : '#d32f2f';
                        authStatus.textContent = data.text;
                    } else {
                        document.getElementById('thinking-msg')?.remove();
                        if (data.text.includes('思考')) appendSystem(data.text, 'thinking-msg');
                        else appendSystem(data.text);
                    }
                } 
                
                // 3. 处理用户聊天
                else if (data.type === 'user') {
                    appendChat(data.sender, data.text, 'msg-left');
                } 
                
                // 4. 处理流式打字机
                else if (data.type === 'ai_stream') {
                    document.getElementById('thinking-msg')?.remove();
                    let streamBubbleId = `stream-${data.target}`;
                    let streamBubble = document.getElementById(streamBubbleId);
                    
                    if (!streamBubble) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'msg-wrapper msg-ai';
                        wrapper.innerHTML = `<div class="msg-sender">🤖 专属 AI 助手</div><div class="message typing-cursor" id="${streamBubbleId}"></div>`;
                        messagesDiv.appendChild(wrapper);
                        streamBubble = document.getElementById(streamBubbleId);
                    }
                    streamBubble.textContent += data.text;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
                else if (data.type === 'ai_stream_end') {
                    let streamBubble = document.getElementById(`stream-${data.target}`);
                    if (streamBubble) {
                        streamBubble.classList.remove('typing-cursor');
                        streamBubble.removeAttribute('id');
                    }
                }
                
                // 5. 处理从数据库加载的历史记录
                else if (data.type === 'ai') {
                    document.getElementById('thinking-msg')?.remove();
                    appendChat(`🤖 专属 AI 助手`, data.reply, 'msg-ai');
                }
            } catch (e) {
                console.error("解析消息失败:", e);
            }
        };

        function appendSystem(text, id = '') {
            const div = document.createElement('div');
            div.className = 'status-sys';
            if (id) div.id = id;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function appendChat(sender, text, wrapperClass) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${wrapperClass}`;
            wrapper.innerHTML = `<div class="msg-sender">${sender}</div><div class="message">${text}</div>`;
            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
